<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Ex2</title>
</head>

<body>
  <input type="text" id="nome">
  <button onclick="saudar()">Enviar</button>
  <p id="msg"></p>
  <script>
    function saudar() {
      let nome = document.getElementById("nome").value;
      document.getElementById("msg").innerText = `Olá, ${nome}!`;
    }
  </script>
</body>

</html>
