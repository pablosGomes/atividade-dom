<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
</head>

<body>
  <input type="text" id="item">
  <button onclick="add()">Adicionar</button>
  <ul id="lista"></ul>
  <script>
    function add() {
      let texto = document.getElementById("item").value;
      let li = document.createElement("li");
      li.innerText = texto;
      document.getElementById("lista").appendChild(li);
    }
  </script>
</body>

</html>
