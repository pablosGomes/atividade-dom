<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Ex1</title>
</head>

<body>
  <input type="text" id="texto">
  <button onclick="mostrar()">Mostrar</button>
  <p id="resultado"></p>
  <script>
    function mostrar() {
      let valor = document.getElementById("texto").value;
      document.getElementById("resultado").innerText = valor;
    }
  </script>
</body>

</html>
